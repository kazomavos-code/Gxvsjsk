<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Large TXT Duplicate Remover</title>
<style>
body{margin:0;min-height:100vh;background:#0f172a;color:white;font-family:Arial,sans-serif;padding:20px}
.box{max-width:700px;margin:auto;background:#111827;padding:24px;border-radius:18px;box-shadow:0 0 25px rgba(0,0,0,.35)}
h1{text-align:center;margin-top:0}
label.upload{display:block;padding:24px;border-radius:14px;background:#2563eb;text-align:center;font-weight:bold;font-size:18px;cursor:pointer}
input[type=file]{display:none}
button{width:100%;padding:16px;border:0;border-radius:12px;background:#2563eb;color:white;font-weight:bold;font-size:17px;margin-top:12px;cursor:pointer}
button:disabled{opacity:.5}
.info{margin-top:16px;background:#1e293b;padding:14px;border-radius:12px;line-height:1.6}
progress{width:100%;height:22px;margin-top:16px}
.small{font-size:13px;opacity:.75;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="box">
  <h1>Large TXT Duplicate Remover</h1>

  <label class="upload" for="fileInput">UPLOAD TXT FILE</label>
  <input id="fileInput" type="file" accept=".txt,text/plain">

  <button id="startBtn" onclick="startClean()">Remove Duplicate</button>
  <button id="downloadBtn" onclick="downloadResult()" disabled>Download TXT</button>

  <progress id="progress" value="0" max="100"></progress>
  <div class="info" id="info">Belum ada file.</div>

  <div class="small">
    Versi ini tidak upload ke API Vercel, jadi tidak kena error FUNCTION_PAYLOAD_TOO_LARGE.
    Proses dilakukan di Web Worker supaya browser tidak freeze/lag berat.
  </div>
</div>

<script>
let resultBlobUrl = null;
let worker = null;

const workerCode = `
self.onmessage = async function(e){
  const file = e.data.file;
  const totalSize = file.size;
  const decoder = new TextDecoder("utf-8");
  const reader = file.stream().getReader();

  const seen = new Set();
  const output = [];
  let leftover = "";
  let bytesRead = 0;
  let totalLines = 0;

  while(true){
    const {done, value} = await reader.read();
    if(done) break;

    bytesRead += value.byteLength;
    const chunkText = decoder.decode(value, {stream:true});
    const combined = leftover + chunkText;
    const parts = combined.split(/\\r?\\n/);
    leftover = parts.pop() || "";

    for(const raw of parts){
      const line = raw.trim();
      if(line === "") continue;
      totalLines++;
      if(!seen.has(line)){
        seen.add(line);
        output.push(line);
      }
    }

    self.postMessage({
      type:"progress",
      progress: Math.floor((bytesRead / totalSize) * 100),
      totalLines,
      unique: seen.size
    });
  }

  if(leftover.trim() !== ""){
    const line = leftover.trim();
    totalLines++;
    if(!seen.has(line)){
      seen.add(line);
      output.push(line);
    }
  }

  const cleaned = output.join("\\n");
  const blob = new Blob([cleaned], {type:"text/plain;charset=utf-8"});

  self.postMessage({
    type:"done",
    blob,
    totalLines,
    unique: seen.size,
    removed: totalLines - seen.size
  });
};
`;

function makeWorker(){
  const blob = new Blob([workerCode], {type:"application/javascript"});
  const url = URL.createObjectURL(blob);
  return new Worker(url);
}

document.getElementById("fileInput").addEventListener("change", function(){
  const file = this.files[0];
  if(file){
    document.getElementById("info").innerHTML =
      "File dipilih: <b>" + file.name + "</b><br>Ukuran: " + formatBytes(file.size);
    document.getElementById("progress").value = 0;
    document.getElementById("downloadBtn").disabled = true;
  }
});

function startClean(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){
    alert("Pilih file TXT dulu.");
    return;
  }

  if(resultBlobUrl){
    URL.revokeObjectURL(resultBlobUrl);
    resultBlobUrl = null;
  }

  document.getElementById("startBtn").disabled = true;
  document.getElementById("downloadBtn").disabled = true;
  document.getElementById("info").innerHTML = "Memproses... jangan tutup halaman.";

  worker = makeWorker();

  worker.onmessage = function(e){
    const data = e.data;

    if(data.type === "progress"){
      document.getElementById("progress").value = data.progress;
      document.getElementById("info").innerHTML =
        "Progress: <b>" + data.progress + "%</b><br>" +
        "Baris terbaca: <b>" + data.totalLines + "</b><br>" +
        "Unique sementara: <b>" + data.unique + "</b>";
    }

    if(data.type === "done"){
      resultBlobUrl = URL.createObjectURL(data.blob);
      document.getElementById("progress").value = 100;
      document.getElementById("info").innerHTML =
        "Selesai!<br>" +
        "Total baris: <b>" + data.totalLines + "</b><br>" +
        "Unique: <b>" + data.unique + "</b><br>" +
        "Duplikat terhapus: <b>" + data.removed + "</b>";
      document.getElementById("downloadBtn").disabled = false;
      document.getElementById("startBtn").disabled = false;
      worker.terminate();
    }
  };

  worker.onerror = function(err){
    document.getElementById("info").innerHTML = "Error: " + err.message;
    document.getElementById("startBtn").disabled = false;
  };

  worker.postMessage({file});
}

function downloadResult(){
  if(!resultBlobUrl){
    alert("Belum ada hasil.");
    return;
  }
  const a = document.createElement("a");
  a.href = resultBlobUrl;
  a.download = "cleaned.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function formatBytes(bytes){
  if(bytes < 1024) return bytes + " B";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(2) + " KB";
  if(bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(2) + " MB";
  return (bytes/1024/1024/1024).toFixed(2) + " GB";
}
</script>
</body>
</html>
